name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt
      - run: pip install pytest flake8 httpx

      - run: |
          flake8 . || true

      # 🔥 FIX HERE
      - run: export PYTHONPATH=$PYTHONPATH:$(pwd)

      - run: pytest -v

      - run: docker build .